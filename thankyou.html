<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="شكراً لطلبك">
  <title>شكراً — الطلب توصّل</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { black: '#171717', dark: '#262626', gray: '#737373', light: '#a3a3a3', border: '#e5e5e5', bg: '#f5f5f5', white: '#ffffff' },
            accent: '#ef4444',
          },
          fontFamily: { cairo: ['Cairo', 'sans-serif'] },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Facebook Pixel -->
  <script>
    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)
    }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '500414762826579');
    fbq('track', 'PageView');
    fbq('track', 'Purchase', { value: 297, currency: 'MAD' });
  </script>
  <noscript>
    <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/>
    <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=Purchase&cd[value]=100&cd[currency]=MAD&noscript=1"/>
  </noscript>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-brand-bg text-brand-black font-cairo antialiased min-h-screen flex flex-col">

  <!-- Top Bar -->
  <div class="bg-brand-black text-white text-center text-xs py-2 px-4 font-medium tracking-wide animate-slide-down">
    🚚 التوصيل فابور لجميع المدن
  </div>

  <main class="flex-1 flex flex-col items-center justify-center px-5 py-12 max-w-lg mx-auto w-full text-center">

    <!-- Success Icon -->
    <div class="success-icon w-20 h-20 mb-6" aria-hidden="true">
      <svg class="checkmark w-20 h-20 block mx-auto" viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>

    <h1 class="thankyou-title text-3xl sm:text-4xl font-extrabold text-brand-black mb-3">
      شكراً بزاف!
    </h1>

    <p class="thankyou-message text-brand-gray text-sm leading-[1.9] max-w-sm mb-8">
      الطلب ديالك توصّل بنجاح. غادي نعيطو ليك قريب باش نأكدّو الطلب ونوصّلوه ليك فـ أقرب وقت.
    </p>

    <!-- Order Summary Card -->
    <div class="w-full bg-white rounded-2xl border border-brand-border p-6 mb-6 text-right thankyou-details shadow-sm">
      <h2 class="text-sm font-bold text-brand-black mb-4">ملخص الطلب ديالك</h2>
      <div class="flex justify-between items-center py-2.5 border-b border-brand-border">
        <span class="text-sm font-semibold text-brand-black">279 درهم</span>
        <span class="text-sm text-brand-gray">ثمن المنتج</span>
      </div>
      <div class="flex justify-between items-center py-2.5 border-b border-brand-border">
        <span class="text-sm font-semibold text-green-600">فابور</span>
        <span class="text-sm text-brand-gray">التوصيل</span>
      </div>
      <div class="flex justify-between items-center py-3">
        <span class="text-base font-extrabold text-brand-black">279 درهم</span>
        <span class="text-sm font-bold text-brand-black">المجموع</span>
      </div>
    </div>

    <!-- Info Items -->
    <div class="w-full flex flex-col gap-3 thankyou-details">
      <div class="detail-item flex items-center gap-3 text-brand-gray text-sm px-4 py-3 bg-white border border-brand-border rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200">
        <svg class="w-5 h-5 text-green-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>غادي نعيطو ليك باش نأكدّو الطلب</span>
      </div>
      <div class="detail-item flex items-center gap-3 text-brand-gray text-sm px-4 py-3 bg-white border border-brand-border rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200">
        <svg class="w-5 h-5 text-green-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span>التوصيل ما بين 24 و 48 ساعة</span>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
